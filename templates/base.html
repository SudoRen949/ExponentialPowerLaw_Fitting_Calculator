<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Exponential & Power-law fitting Calculator</title>
        <!-- Tailwind CSS Engine -->
        <script src="https://cdn.tailwindcss.com"></script>
        <!-- MathJax Configuration Framework -->
        <script>
            window.MathJax = {
                tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
                svg: { fontCache: 'global' }
            };
        </script>
        <script type="text/javascript" id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    </head>
    <body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col justify-between">
        <header class="bg-indigo-700 text-white shadow-md py-5 px-6">
            <div class="max-w-6xl mx-auto flex justify-center items-center">
                <h1 class="text-2xl font-bold tracking-tight">Exponential and Power-law fitting Calculator</h1>
                <!-- <span class="text-sm bg-indigo-800 px-3 py-1.5 rounded-md font-mono">Flask + Tailwind Engine</span> -->
            </div>
        </header>

        <main class="max-w-6xl w-full mx-auto p-4 md:p-8 flex-grow">
            {% block content %} {% endblock %}
        </main>
    </body>
</html>
